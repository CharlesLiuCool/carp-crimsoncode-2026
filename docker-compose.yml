services:
  # ─── Hospital client ───────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - backend_artifacts:/app/hospital_client/backend/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy

  # ─── Central CARP server ───────────────────────────────────────────────────
  server_backend:
    build:
      context: .
      dockerfile: Dockerfile.server-backend
    ports:
      - "8001:8001"
    volumes:
      - server_uploaded_weights:/app/uploaded_weights
      - server_artifacts:/app/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  server_frontend:
    build:
      context: .
      dockerfile: Dockerfile.server-frontend
    ports:
      - "8082:80"
    depends_on:
      server_backend:
        condition: service_healthy

volumes:
  backend_artifacts:
  server_uploaded_weights:
  server_artifacts:
