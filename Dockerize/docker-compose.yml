# Run from project root:  docker compose -f Dockerize/docker-compose.yml up -d
# Build context is project root (..) so COPY in Dockerfiles see hospital_client/, server/, etc.

services:
  # ─── Hospital client ──────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: Dockerize/Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - backend_artifacts:/app/hospital_client/backend/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ..
      dockerfile: Dockerize/Dockerfile.frontend
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy

  # ─── Central CARP server (PostgreSQL for weights) ───────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-carp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-carp}
      POSTGRES_DB: ${POSTGRES_DB:-carp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-carp} -d ${POSTGRES_DB:-carp}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  server_backend:
    build:
      context: ..
      dockerfile: Dockerize/Dockerfile.server-backend
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-carp}:${POSTGRES_PASSWORD:-carp}@db:5432/${POSTGRES_DB:-carp}
      AGGREGATION_SECRET: ${AGGREGATION_SECRET:-carp-default-secret-change-in-production}
      MIN_CONTRIBUTORS: ${MIN_CONTRIBUTORS:-3}
    volumes:
      - server_artifacts:/app/artifacts
      - ../.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  server_frontend:
    build:
      context: ..
      dockerfile: Dockerize/Dockerfile.server-frontend
    ports:
      - "8082:80"
    depends_on:
      server_backend:
        condition: service_healthy

volumes:
  backend_artifacts:
  postgres_data:
  server_artifacts:
